<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会員証</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- QRコード生成ライブラリ（CDN経由） -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .org-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 24px;
    }
    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 16px;
      border: 3px solid #06C755;
    }
    .member-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .member-number {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .info-label { color: #aaa; }
    .info-value { font-weight: 600; color: #1a1a2e; }
    .expiry-valid { color: #06C755; }
    .expiry-expired { color: #e53935; }
    .qr-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 2px dashed #eee;
    }
    .qr-label {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 12px;
    }
    #qrcode canvas {
      margin: 0 auto;
      border-radius: 8px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 15px;
    }
    .error-card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 360px;
      text-align: center;
    }
    .error-card p { color: #e53935; margin-bottom: 16px; }
    .error-card a {
      color: #06C755;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">会員証を読み込んでいます...</div>
</div>

<script>
// =============================================
// ここを自分の値に書き換えてください
// =============================================
const LIFF_ID = "2009411129-krHG0d1O";
const SUPABASE_URL = "https://oklwnpyetvurpiwvvkhe.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nIjrKZ8Pk6Jwvw3qVcSh6Q_1peUGqEr";
// =============================================

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const userSub = liff.getDecodedIDToken().sub;
    const profile = await liff.getProfile();

    // Supabaseから自分のデータを取得する
    const member = await fetchMember(userSub);

    if (!member) {
      // 未登録なら登録画面へ
      showUnregistered();
      return;
    }

    // 会員証を表示する
    showCard(member, profile);

  } catch (e) {
    document.getElementById("app").innerHTML = `
      <div class="error-card">
        <p>エラーが発生しました:<br>${e.message}</p>
      </div>
    `;
  }
}

async function fetchMember(sub) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/members?line_sub=eq.${sub}&select=*`,
    {
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY
      }
    }
  );
  const data = await res.json();
  return data.length > 0 ? data[0] : null;
}

function showCard(member, profile) {
  // 有効期限のチェック
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const expiry = new Date(member.expiry_date);
  const isValid = expiry >= today;

  // 表示用の日付フォーマット
  const expiryStr = expiry.toLocaleDateString("ja-JP", {
    year: "numeric", month: "long", day: "numeric"
  });

  document.getElementById("app").innerHTML = `
    <div class="card">
      <div class="org-name">Member Card</div>
      <div class="card-title">会員証</div>

      <img class="avatar"
        src="${profile.pictureUrl || 'https://via.placeholder.com/70'}"
        alt="プロフィール画像">

      <div class="member-name">${escapeHtml(member.full_name)}</div>
      <div class="member-number">会員番号：${escapeHtml(member.member_number)}</div>

      <div class="info-row">
        <span class="info-label">有効期限</span>
        <span class="info-value ${isValid ? 'expiry-valid' : 'expiry-expired'}">
          ${expiryStr}${isValid ? ' ✓' : ' ✗ 期限切れ'}
        </span>
      </div>
      <div class="info-row">
        <span class="info-label">ステータス</span>
        <span class="info-value ${isValid ? 'expiry-valid' : 'expiry-expired'}">
          ${isValid ? '有効' : '無効'}
        </span>
      </div>

      <div class="qr-section">
        <div class="qr-label">受付でこのQRコードを提示してください</div>
        <div id="qrcode"></div>
      </div>
    </div>
  `;

  // QRコードを生成する
  // QRコードの中身は「会員番号|氏名」の形式
  const qrData = `${member.member_number}|${member.full_name}`;
  QRCode.toCanvas(
    document.createElement("canvas"),
    qrData,
    {
      width: 180,
      margin: 2,
      color: {
        dark: "#1a1a2e",
        light: "#ffffff"
      }
    },
    (err, canvas) => {
      if (!err) {
        document.getElementById("qrcode").appendChild(canvas);
      }
    }
  );
}

function showUnregistered() {
  document.getElementById("app").innerHTML = `
    <div class="error-card">
      <p>会員情報が見つかりませんでした。<br>先に登録を行ってください。</p>
      <a href="register.html">→ 登録画面へ</a>
    </div>
  `;
}

// XSS対策（安全のためにHTML特殊文字をエスケープする）
function escapeHtml(str) {
  const div = document.createElement("div");
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

init();
</script>
</body>
</html>
```
