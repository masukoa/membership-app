<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
    .subtitle {
      font-size: 13px; color: #888;
      text-align: center; margin-bottom: 28px; line-height: 1.8;
    }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 16px; margin-bottom: 6px; outline: none;
    }
    input:focus { border-color: #06C755; }
    .hint {
      font-size: 12px; color: #aaa;
      margin-bottom: 18px; line-height: 1.6;
    }
    button {
      width: 100%; padding: 14px;
      background: #06C755; color: white;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #message {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      font-size: 14px; text-align: center;
      display: none; line-height: 1.7; white-space: pre-line;
    }
    .success { background: #e6f9ee; color: #1a7a3f; display: block !important; }
    .error   { background: #fdecea; color: #b71c1c; display: block !important; }
    .loading-text { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="loading-text">読み込み中...</div>
</div>

<script>
// =============================================
// ここを自分の値に書き換えてください
// =============================================
const LIFF_ID        = "2009411129-BHFuZprv";
const SUPABASE_URL   = "https://oklwnpyetvurpiwvvkhe.supabase.co";
const SUPABASE_KEY   = "sb_publishable_nIjrKZ8Pk6Jwvw3qVcSh6Q_1peUGqEr";
const INDEX_LIFF_URL = "https://liff.line.me/2009411129-krHG0d1O";
// =============================================

let userSub = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    userSub = liff.getDecodedIDToken().sub;

    // すでに連携済みなら会員証へ
    const already = await findBySub(userSub);
    if (already) {
      window.location.href = INDEX_LIFF_URL;
      return;
    }

    showForm();
  } catch(e) {
    document.getElementById("app").innerHTML =
      `<p style="color:red;text-align:center;">エラー: ${e.message}</p>`;
  }
}

async function findBySub(sub) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/members?line_sub=eq.${encodeURIComponent(sub)}&select=id`,
    { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
  );
  const data = await res.json();
  return data.length > 0;
}

function showForm() {
  document.getElementById("app").innerHTML = `
    <h1>🪪 LINE連携</h1>
    <p class="subtitle">
      会員番号と<strong>カタカナのお名前</strong>を<br>入力してください
    </p>

    <label>会員番号</label>
    <input type="text" id="member_number"
      placeholder="例：50172515"
      inputmode="numeric"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <p class="hint">お手元の会員証に記載されている番号８桁</p>

    <label>お名前（カタカナ）</label>
    <input type="text" id="full_name"
      placeholder="例：タナカタロウ"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <p class="hint">
      ・姓と名のあいだはスペースなし<br>
      ・カタカナで入力してください<br>
      ・例：ヤマダハナコ
    </p>

    <button id="btn" onclick="linkAccount()">連携する</button>
    <div id="message"></div>
  `;
}

async function linkAccount() {
  const memberNumber = document.getElementById("member_number").value.trim();
  const fullName     = document.getElementById("full_name").value.trim();

  if (!memberNumber || !fullName) {
    showMsg("会員番号とお名前を両方入力してください", "error");
    return;
  }

  const katakanaOnly = /^[ァ-ヶー]+$/.test(fullName);
  if (!katakanaOnly) {
    showMsg("お名前はカタカナで入力してください\n例：タナカタロウ", "error");
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.textContent = "確認中...";

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/members?member_number=eq.${encodeURIComponent(memberNumber)}&full_name=eq.${encodeURIComponent(fullName)}&select=*`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
    );
    const data = await res.json();

    if (data.length === 0) {
      showMsg(
        "会員情報が見つかりませんでした。\n以下をご確認ください：\n・会員番号が正しいか\n・カタカナで入力しているか\n・スペースが入っていないか",
        "error"
      );
      btn.disabled = false;
      btn.textContent = "連携する";
      return;
    }

    const member = data[0];

    if (member.line_sub && member.line_sub !== userSub) {
      showMsg(
        "この会員情報はすでに別のLINEアカウントと連携済みです。\n事務局にお問い合わせください。",
        "error"
      );
      btn.disabled = false;
      btn.textContent = "連携する";
      return;
    }

    const updateRes = await fetch(
      `${SUPABASE_URL}/rest/v1/members?id=eq.${member.id}`,
      {
        method: "PATCH",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ line_sub: userSub })
      }
    );

    if (updateRes.ok) {
      showMsg("✅ 連携が完了しました！\n会員証を表示します...", "success");
      setTimeout(() => { window.location.href = INDEX_LIFF_URL; }, 2000);
    } else {
      showMsg("連携に失敗しました。もう一度お試しください。", "error");
      btn.disabled = false;
      btn.textContent = "連携する";
    }

  } catch(e) {
    showMsg("エラーが発生しました: " + e.message, "error");
    btn.disabled = false;
    btn.textContent = "連携する";
  }
}

function showMsg(text, type) {
  const el = document.getElementById("message");
  el.textContent = text;
  el.className = type;
}

init();
</script>
</body>
</html>
